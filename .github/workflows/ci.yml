name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv==0.5.18

      - name: Install dependencies
        run: |
          uv pip install --system -e .
          uv pip install --system pytest pytest-asyncio ruff mypy

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type-check (mypy)
        run: mypy app
        continue-on-error: true

      - name: Tests
        env:
          OPENAI_API_KEY: dummy-not-used-in-smoke
          MCP_DATAGOUV_URL: https://mcp.data.gouv.fr/mcp
        run: pytest -v
